<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Community | Onboarding</title>
    <meta name="description" content="Exclusive onboarding for Alpha Community members.">
    
    <!-- Fonts from UI UX Pro Max Recommendations -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body class="oled-theme">
    <div class="background-glow"></div>
    
    <div class="app-wrapper">
        <header class="hero">
            <h1 class="hero-title">ALPHA <span class="text-red">COMMUNITY</span></h1>
            <p class="hero-subtitle">Elevate your performance. Join the inner circle.</p>
            <div class="header-links">
                <a href="https://whatsapp.com/channel/0029Vb7P1Yw6WaKhRmK6rJ3T" target="_blank" class="channel-link">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12.04 2c-5.46 0-9.91 4.45-9.91 9.91 0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38c1.45.79 3.08 1.21 4.74 1.21 5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.816 9.816 0 0 0 12.04 2m.01 1.67c2.2 0 4.26.86 5.82 2.42 1.56 1.56 2.41 3.63 2.41 5.83 0 4.54-3.7 8.23-8.24 8.23-1.48 0-2.93-.39-4.19-1.14l-.3-.17-3.12.82.83-3.04-.19-.3a8.132 8.132 0 0 1-1.26-4.38c.01-4.54 3.7-8.24 8.24-8.24m-3.61 4.75c-.13-.3-.27-.31-.4-.32-.1-.01-.23-.01-.35-.01-.12 0-.32.05-.49.23-.17.18-.63.62-.63 1.51s.65 1.76.74 1.88c.09.12 1.28 1.96 3.11 2.75.43.19.77.3 1.04.39.44.14.83.12 1.15.07.35-.05 1.07-.44 1.22-.86.15-.42.15-.78.11-.86-.04-.08-.16-.12-.32-.21s-.98-.48-1.13-.53-.26-.08-.37.09c-.11.17-.43.53-.53.65-.1.12-.2.13-.37.05s-.7-.26-1.33-.82c-.49-.44-.82-.98-.92-1.15s-.01-.26.07-.34c.08-.07.17-.18.26-.27.09-.09.12-.16.18-.26.06-.11.03-.2-.01-.3s-.4-1.01-.55-1.36z"/></svg>
                    JOIN CHANNEL
                </a>
            </div>
        </header>

        <main class="content-body">
            <form id="onboarding-form" class="onboarding-form">
                <!-- Section 1: Identity -->
                <div class="form-container">
                    <div class="input-grid">
                        <div class="field">
                            <label for="full-name">Full Name</label>
                            <input type="text" id="full-name" name="full-name" placeholder="YOUR NAME" required>
                        </div>
                        <div class="field">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="EMAIL ADDRESS" required>
                        </div>
                        <div class="field">
                            <label for="phone">WhatsApp Number</label>
                            <input type="tel" id="phone" name="phone" placeholder="+1 (000) 000-0000" required>
                        </div>
                    </div>

                    <div class="membership-toggle">
                        <p class="toggle-label">Are you already a member?</p>
                        <div class="radio-options">
                            <label class="option-card">
                                <input type="radio" name="membership" value="yes" required>
                                <span class="card-ui">
                                    <span class="status">MEMBER</span>
                                    <span class="desc">I have active access</span>
                                </span>
                            </label>
                            <label class="option-card">
                                <input type="radio" name="membership" value="no" required>
                                <span class="card-ui">
                                    <span class="status">OUTSIDER</span>
                                    <span class="desc">Newcomer / Non-member</span>
                                </span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Section 2: Payment (Dynamic) -->
                <section id="payment-step" class="payment-step hidden">
                    <div class="payment-container">
                        <h2 class="section-title">Reserved Entry</h2>
                        <p class="section-desc">To secure your spot, scan the QR and upload proof of payment.</p>
                        
                        <div class="qr-display">
                            <div class="qr-wrapper" id="qr-target">
                                <div class="qr-content">
                                    <img src="qr-code.png" alt="Alpha Fitness Gym Payment QR" class="qr-image">
                                    <p class="qr-upi">msalphafitnessgym.eazypay@icici</p>
                                </div>
                            </div>
                        </div>

                        <div class="upload-zone">
                            <div class="file-input-wrapper">
                                <label for="payment-proof" class="custom-file-label">
                                    <span class="upload-icon">↑</span>
                                    <span class="upload-text">UPLOAD RECEIPT</span>
                                    <span class="file-name" id="file-name-display">NO FILE SELECTED</span>
                                </label>
                                <input type="file" id="payment-proof" name="payment-proof" accept="image/*" hidden>
                            </div>
                            <div id="preview-container" class="preview-container">
                                <!-- Image preview injected here -->
                            </div>
                        </div>
                    </div>
                </section>

                <footer class="form-actions">
                    <button type="submit" id="submit-btn" class="submit-btn">CONTINUE TO WHATSAPP</button>
                    <p class="legal">By submitting, you agree to the Alpha Community terms.</p>
                </footer>
            </form>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
